<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400">
  <style>
    text { font-family: sans-serif; }
    .title { font-size: 14px; font-weight: bold; }
    .label { font-size: 12px; }
    .box { rx: 8; stroke-width: 2; }
  </style>
  <!-- Git Repository -->
  <rect class="box" x="250" y="10" width="200" height="60" fill="#f3e8ff" stroke="#9333ea"/>
  <text class="title" x="350" y="35" text-anchor="middle" fill="#581c87">Git Repository</text>
  <text class="label" x="350" y="55" text-anchor="middle" fill="#7c3aed">(.md, images, config)</text>
  <!-- Arrow down -->
  <line x1="350" y1="70" x2="350" y2="110" stroke="#4a5568" stroke-width="2"/>
  <polygon points="345,105 355,105 350,115" fill="#4a5568"/>
  <!-- Parser -->
  <rect class="box" x="50" y="120" width="160" height="60" fill="#ebf5ff" stroke="#3b82f6"/>
  <text class="title" x="130" y="145" text-anchor="middle" fill="#1e40af">Markdown Parser</text>
  <text class="label" x="130" y="165" text-anchor="middle" fill="#3b82f6">Headings, Tables, Code</text>
  <!-- Image Resolver -->
  <rect class="box" x="270" y="120" width="160" height="60" fill="#ebf5ff" stroke="#3b82f6"/>
  <text class="title" x="350" y="145" text-anchor="middle" fill="#1e40af">Image Resolver</text>
  <text class="label" x="350" y="165" text-anchor="middle" fill="#3b82f6">SVG, PNG, JPG</text>
  <!-- Link Resolver -->
  <rect class="box" x="490" y="120" width="160" height="60" fill="#ebf5ff" stroke="#3b82f6"/>
  <text class="title" x="570" y="145" text-anchor="middle" fill="#1e40af">Link Resolver</text>
  <text class="label" x="570" y="165" text-anchor="middle" fill="#3b82f6">Relative, Anchor, Ext</text>
  <!-- Lines from repo to parsers -->
  <line x1="300" y1="70" x2="130" y2="120" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="400" y1="70" x2="570" y2="120" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="4"/>
  <!-- Arrow down to renderer -->
  <line x1="130" y1="180" x2="130" y2="220" stroke="#4a5568" stroke-width="2"/>
  <line x1="350" y1="180" x2="350" y2="220" stroke="#4a5568" stroke-width="2"/>
  <line x1="570" y1="180" x2="570" y2="220" stroke="#4a5568" stroke-width="2"/>
  <!-- PDF Renderer -->
  <rect class="box" x="100" y="230" width="500" height="60" fill="#fef3c7" stroke="#f59e0b"/>
  <text class="title" x="350" y="255" text-anchor="middle" fill="#92400e">PDF Renderer</text>
  <text class="label" x="350" y="275" text-anchor="middle" fill="#b45309">Layout, Pagination, Styling, TOC Generation</text>
  <!-- Arrow down -->
  <line x1="350" y1="290" x2="350" y2="330" stroke="#4a5568" stroke-width="2"/>
  <polygon points="345,325 355,325 350,335" fill="#4a5568"/>
  <!-- PDF Output -->
  <rect class="box" x="250" y="340" width="200" height="50" fill="#dcfce7" stroke="#22c55e"/>
  <text class="title" x="350" y="370" text-anchor="middle" fill="#166534">PDF Document</text>
</svg>
